name: Daily Endpoints News Scan

on:
  schedule:
    - cron: '0 19 * * *'   # 2:00 PM EST (7:00 PM UTC) every day
  workflow_dispatch:        # Manual trigger

jobs:
  scan-endpoints:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Endpoints News scan (daily)
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_ENV:                  production
        run: node scripts/endpointsScan.js --mode daily
