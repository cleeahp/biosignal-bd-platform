name: Daily NIH Funding Scan

on:
  schedule:
    - cron: '0 13 * * *'   # 8:00 AM EST (1:00 PM UTC) every day
  workflow_dispatch:        # Manual trigger

jobs:
  scan-nih-funding:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run NIH funding scan (daily)
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_ENV:                  production
        run: node scripts/nihFundingScan.js --mode daily
