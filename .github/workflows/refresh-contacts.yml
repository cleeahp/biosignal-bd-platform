name: Refresh Contact LinkedIn Data

on:
  workflow_dispatch:   # Manual trigger only from the GitHub Actions tab

jobs:
  refresh-contacts:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # Up to 3 hours — 100 requests × 20-45s delays + breaks

    env:
      NODE_TLS_REJECT_UNAUTHORIZED: "0"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Refresh LinkedIn contact data
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LINKEDIN_LI_AT:            ${{ secrets.LINKEDIN_LI_AT }}
        run: node scripts/refreshContactsLinkedIn.js
