name: Nightly Signal Agents

on:
  schedule:
    - cron: '0 1 * * *'   # 1:00 AM UTC every day
  workflow_dispatch:        # Manual trigger

jobs:
  run-signal-agents:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run signal agents
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODE_ENV:                  production
        run: node scripts/runSignalAgents.js

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: signal-agent-logs
          path: logs/
          retention-days: 7
