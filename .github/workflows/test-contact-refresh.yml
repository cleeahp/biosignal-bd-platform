name: Test Contact LinkedIn Refresh

on:
  workflow_dispatch:

env:
  NODE_TLS_REJECT_UNAUTHORIZED: "0"

jobs:
  test-refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run test contact refresh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LINKEDIN_LI_AT: ${{ secrets.LINKEDIN_LI_AT }}
          TEST_CONTACT_NAME: "Jennifer Herring"
          TEST_CONTACT_COMPANY: "ADC Therapeutics"
        run: node scripts/testContactRefresh.js
